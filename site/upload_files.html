<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="#">
    <meta name="author" content="Isabella">
    <meta name="description" content="topic modeling">
    <meta name="keywords" content="topic modeling">
    <!-------------------------------------->
    <link rel="stylesheet" href="css/estilo_esqueleto.css">
    <link rel="stylesheet" href="css/input_bar.css">
    <link rel="stylesheet" href="css/pageAdd.css">
    <!-------------------------------------->
    <script type="text/javascript" src="js/upload_files.js"></script>
    <script type="text/javascript" src="js/popUp.js"></script>
</head>
<body>
    <header>
        <p class="typewriter"><b>Topic</b><b>Generation</b></p>
    </header>
    <div id="main">
        <nav class="navbar">
            <ul class="navbar__menu">
                <li class="navbar__item">
                    <a href="#" class="navbar__link"><img src="img/home2.png" alt="add files"><span>Home</span></a>
                  </li>
              <li class="navbar__item">
                <a href="#" class="navbar__link"><img src="img/add2.png" alt="add files"><span>Add files</span></a>
              </li>
              <li class="navbar__item">
                <a href="#" class="navbar__link"><img src="img/all-documents.png" alt="all files"></i><span>All files</span></a>        
              </li>
              <li class="navbar__item">
                <a href="#" class="navbar__link"><img src="img/search.png" alt="all files"><span>Search files</span></a>        
              </li>
            </ul>
        </nav>
        <div id="upload-files">
            <div class="titUpLoad">
                <p>
                    <span class="up">up</span>
                    <span>load</span>
                </p>
            </div>
            <div id="drop" class="hidden">
                <img id="icon-upload-file" src="img/icon-upload-file.svg" alt="upload files">
                <p class="pointer-none"><b style="color: #4db6ac;">Drag and drop</b> files here <br /> or <a href=""
                        id="triggerFile" style="color: #4db6ac;">browse</a> to begin the upload</p>
                <input type="file" multiple="multiple"/>
            </div>
            <div id="files-active" class="file">
                <p class="titles-file">FILES</p>
                <div class="lines-update">
                    <div class="carregandoFiles">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 4335 4335">
                            <path fill="#4db6ac" d="M3346 1077c41,0 75,34 75,75 0,41 -34,75 -75,75 -41,0 -75,-34 -75,-75 0,-41 34,-75 75,-75zm-1198 -824c193,0 349,156 349,349 0,193 -156,349 -349,349 -193,0 -349,-156 -349,-349 0,-193 156,-349 349,-349zm-1116 546c151,0 274,123 274,274 0,151 -123,274 -274,274 -151,0 -274,-123 -274,-274 0,-151 123,-274 274,-274zm-500 1189c134,0 243,109 243,243 0,134 -109,243 -243,243 -134,0 -243,-109 -243,-243 0,-134 109,-243 243,-243zm500 1223c121,0 218,98 218,218 0,121 -98,218 -218,218 -121,0 -218,-98 -218,-218 0,-121 98,-218 218,-218zm1116 434c110,0 200,89 200,200 0,110 -89,200 -200,200 -110,0 -200,-89 -200,-200 0,-110 89,-200 200,-200zm1145 -434c81,0 147,66 147,147 0,81 -66,147 -147,147 -81,0 -147,-66 -147,-147 0,-81 66,-147 147,-147zm459 -1098c65,0 119,53 119,119 0,65 -53,119 -119,119 -65,0 -119,-53 -119,-119 0,-65 53,-119 119,-119z"
                            />
                        </svg>
                    </div>
                </div>
                <div class="buttons-upload">
                    <button>
                        <span id="cancel-upload-files">cancel</span>
                    </button>
                    <button>
                        <span id="confirm-upload-files">confirm files</span>
                    </button>
                </div>
           </div>
        </div>
        <img id="help_button" src="img/help5_2.png" alt="all files">
    </div>
</body>
<div class="pop-up">
    <div class="box-popUp">
        <button>x</button>
        <div>Como usar?</div>
        <p>Watch the following video to understand how to use Topic Generation.</p>
    </div>
</div>
